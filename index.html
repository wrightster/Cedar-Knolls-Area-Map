<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cedar Knolls Area Map</title>

  <!-- MapLibre GL JS -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Filter Bar -->
  <nav id="filter-bar" role="navigation" aria-label="Category filters">
    <button class="filter-btn active" data-category="all">All</button>
    <!-- Category buttons injected by JS -->
  </nav>

  <!-- Main content: map + side panel -->
  <div id="main-content">
    <div id="map"></div>

    <!-- Side Panel -->
    <aside id="side-panel" aria-label="Place details" aria-hidden="true">
      <button id="panel-close" aria-label="Close panel">&times;</button>
      <div id="panel-content">
        <div id="panel-category-badge"></div>
        <h2 id="panel-name"></h2>
        <p id="panel-meta"></p>
        <p id="panel-address"></p>
        <p id="panel-phone"></p>
        <a id="panel-website" href="#" target="_blank" rel="noopener noreferrer"></a>
        <a id="panel-gmaps" href="#" target="_blank" rel="noopener noreferrer" class="gmaps-btn">
          View in Google Maps
        </a>
      </div>
    </aside>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>

  <script src="js/map.js"></script>
</body>
</html>
