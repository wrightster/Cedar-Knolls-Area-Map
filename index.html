<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cedar Knolls Area Map</title>

  <!-- MapLibre GL JS -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Main content: map + overlays -->
  <div id="main-content">
    <div id="map"></div>
    <div id="zoom-display"></div>

    <!-- Filter overlay: toggle + inline filter pills -->
    <div id="filter-overlay">
      <button id="filter-toggle" aria-label="Toggle filters" aria-expanded="false">
        Filters <span class="chevron">&#9660;</span>
      </button>
      <nav id="filter-bar" role="navigation" aria-label="Category filters" aria-hidden="true">
        <button class="filter-btn active" data-category="all">All</button>
        <!-- Category buttons injected by JS -->
      </nav>
    </div>

    <!-- Side Panel -->
    <aside id="side-panel" aria-label="Place details" aria-hidden="true">
      <div id="panel-scroll">
        <div id="panel-content">
          <div id="panel-photo-wrap" style="display:none">
            <img id="panel-photo" alt="" loading="lazy">
            <p id="panel-photo-attr">Photos provided by Google</p>
          </div>
          <div id="panel-header">
            <div id="panel-category-badge"></div>
            <h2 id="panel-name"></h2>
            <p id="panel-meta"></p>
            <p id="panel-address"></p>
            <p id="panel-phone"></p>
            <a id="panel-website" href="#" target="_blank" rel="noopener noreferrer"></a>
            <a id="panel-gmaps" href="#" target="_blank" rel="noopener noreferrer" class="gmaps-btn">
              View in Google Maps
            </a>
          </div>
          <div id="panel-details"></div>
        </div>
      </div>
    </aside>

    <!-- Panel collapse/expand tab -->
    <button id="panel-toggle" aria-label="Toggle panel" hidden>
      <svg id="panel-toggle-icon" viewBox="0 0 12 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <polygon points="0,0 12,10 0,20" fill="#f9f8f2"/>
      </svg>
    </button>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>

  <script src="js/map.js"></script>
</body>
</html>
